name: GitHub Pages Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm ci
      - name: Build Slides > 2026 > Using Components 3
        working-directory: 2026/using-components-3
        run: |
          npx slidev build --base /${{github.event.repository.name}}/2026/using-components-3/ --out ../../dist/2026/using-components-3/

      - name: Build App > 2026 > Using Components 3 > 01-shell-application
        working-directory: 2026/using-components-3/demo/01-shell-application
        run: |
          npm install --no-package-lock --no-audit --no-fund
          npx vite build \
            --base=/${{github.event.repository.name}}/2026/using-components-3/demo/01-shell-application/ \
            --outDir=../../../../dist/2026/using-components-3/demo/01-shell-application/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
